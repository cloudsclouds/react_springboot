spring.application.name=server-springboot

# datasource
spring.datasource.url=jdbc:mysql://localhost:3306/platform?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


# mybatis
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-aliases-package=com.example.server_springboot.entity
mybatis.configuration.map-underscore-to-camel-case=true

# redis
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.database=0


# （可选）打印SQL
mybatis.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl