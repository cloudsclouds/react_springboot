spring.application.name=server-springboot

# datasource
spring.datasource.url=jdbc:mysql://localhost:3306/platform?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


# mybatis
mybatis.mapper-locations=classpath*:mapper/**/*.xml
mybatis.type-aliases-package=com.example.server_springboot.entity,com.example.server_springboot.kb.entity,com.example.server_springboot.ai.entity
mybatis.configuration.map-underscore-to-camel-case=true

# redis
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.database=0

# ai (DashScope SDK)
ai.api-key=${DASHSCOPE_API_KEY:}
ai.base-url=https://dashscope.aliyuncs.com/compatible-mode/v1
ai.model-name=qwen-plus
ai.embedding-model=qwen-text-embedding-v3
ai.temperature=0.7
ai.max-tokens=2048


# （可选）打印SQL
mybatis.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl

# CORS（可用环境变量 APP_CORS_ALLOWED_ORIGINS 覆盖）
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000}

# upload limits
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB